# ============================================================================
# GENERAL CONFIGURATION
# ============================================================================

# --- Pane Borders (everforest, single solid color) ---
set -g pane-border-lines "heavy"
set -g pane-border-style fg='#a7c080'
set -g pane-active-border-style fg='#a7c080'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

setw -g mode-keys vi

set -g mouse on

# Mouse bindings
bind -n MouseDown1Pane select-pane -t=\; send-keys -M
bind -n MouseDrag1Border resize-pane -M
bind -n MouseDown1Status select-window -t=
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"

set -s escape-time 0

set -g history-limit 2000

# ============================================================================
# PREFIX KEY
# ============================================================================

# Set C-Space as prefix
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# ============================================================================
# KEY BINDINGS
# ============================================================================

# --- Config & Session Management ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind s choose-tree -s

# --- Window Selection ---
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# --- Pane Navigation ---
bind Left select-pane -L
bind Right select-pane -R
bind Up select-pane -U
bind Down select-pane -D

# --- Pane Resizing ---
bind S-Left resize-pane -L 5
bind S-Right resize-pane -R 5
bind S-Up resize-pane -U 3
bind S-Down resize-pane -D 3

# --- Splitting Windows ---
bind h split-window -v
bind v split-window -h

# --- Window & Pane Management ---
bind Enter new-window
bind c kill-pane
bind q kill-window
bind d detach
bind Q confirm-before -p "Kill entire session? (y/n)" kill-session

# --- Search ---
bind / copy-mode \; command-prompt -p "(search down)" "send -X search-forward '%%%'"
bind ? copy-mode \; command-prompt -p "(search up)"   "send -X search-backward '%%%'"

# ============================================================================
# COPY MODE
# ============================================================================

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy || xclip -in -selection clipboard"

# ============================================================================
# PLUGINS
# ============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-powerline: powerline statusline (everforest dark hard theme)
set -g @plugin 'erikw/tmux-powerline'

run '~/.config/tmux/plugins/tpm/tpm'

# keep the status bar at the bottom (override minimono's default)
set -g status-position bottom

# Unify the whole bar to one tone (#272e33) so the padding around the centered
# window list matches the segments — no light/dark strips.
set -g status-style "bg=#272e33,fg=#d3c6aa"
set -gw window-status-style "bg=#272e33,fg=#859289"
# legacy status-bg fills the window-list padding; pin it too or it shows through
set -g status-bg "#272e33"
