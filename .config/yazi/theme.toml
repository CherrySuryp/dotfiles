# Everforest Dark Hard theme for Yazi
# Palette from sainnhe/everforest (Dark Hard), bg aligned to #272e33 to match
# the rest of the setup (nvim/tmux/ghostty).
#
# bg #272e33  bg1 #2e383c  bg2 #374145  bg_dim #1e2326
# fg #d3c6aa  grey0 #7a8478  grey1 #859289
# red #e67e80  orange #e69875  yellow #dbbc7f  green #a7c080
# aqua #83c092  blue #7fbbb3  purple #d699b6

[mgr]
cwd = { fg = "#7fbbb3" }
hovered         = { reversed = true }
preview_hovered = { underline = true }
find_keyword  = { fg = "#dbbc7f", bold = true, italic = true, underline = true }
find_position = { fg = "#d699b6", bg = "reset", bold = true, italic = true }
marker_copied   = { fg = "#a7c080", bg = "#a7c080" }
marker_cut      = { fg = "#e67e80", bg = "#e67e80" }
marker_marked   = { fg = "#7fbbb3", bg = "#7fbbb3" }
marker_selected = { fg = "#dbbc7f", bg = "#dbbc7f" }
count_copied   = { fg = "#272e33", bg = "#a7c080" }
count_cut      = { fg = "#272e33", bg = "#e67e80" }
count_selected = { fg = "#272e33", bg = "#dbbc7f" }
border_symbol = "│"
border_style  = { fg = "#7a8478" }

[tabs]
active   = { fg = "#272e33", bg = "#a7c080", bold = true }
inactive = { fg = "#a7c080", bg = "#2e383c" }

[mode]
normal_main = { fg = "#272e33", bg = "#a7c080", bold = true }
normal_alt  = { fg = "#a7c080", bg = "#2e383c" }
select_main = { fg = "#272e33", bg = "#7fbbb3", bold = true }
select_alt  = { fg = "#7fbbb3", bg = "#2e383c" }
unset_main = { fg = "#272e33", bg = "#e67e80", bold = true }
unset_alt  = { fg = "#e67e80", bg = "#2e383c" }

[status]
perm_sep   = { fg = "#7a8478" }
perm_type  = { fg = "#7fbbb3" }
perm_read  = { fg = "#dbbc7f" }
perm_write = { fg = "#e67e80" }
perm_exec  = { fg = "#a7c080" }
progress_label  = { fg = "#d3c6aa", bold = true }
progress_normal = { fg = "#a7c080", bg = "#2e383c" }
progress_error  = { fg = "#dbbc7f", bg = "#e67e80" }

[pick]
border   = { fg = "#a7c080" }
active   = { fg = "#d699b6", bold = true }
inactive = {}

[input]
border   = { fg = "#a7c080" }
title    = {}
value    = {}
selected = { reversed = true }

[cmp]
border = { fg = "#a7c080" }

[tasks]
border  = { fg = "#a7c080" }
title   = {}
hovered = { fg = "#d699b6", bold = true }

[which]
mask            = { bg = "#2e383c" }
cand            = { fg = "#7fbbb3" }
rest            = { fg = "#7a8478" }
desc            = { fg = "#d699b6" }
separator       = "  "
separator_style = { fg = "#7a8478" }

[help]
on      = { fg = "#7fbbb3" }
run     = { fg = "#d699b6" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#2e383c", bg = "#d3c6aa" }

[spot]
border   = { fg = "#a7c080" }
title    = { fg = "#a7c080" }
tbl_col  = { fg = "#7fbbb3" }
tbl_cell = { fg = "#d699b6", bg = "#2e383c" }

[notify]
title_info  = { fg = "#a7c080" }
title_warn  = { fg = "#dbbc7f" }
title_error = { fg = "#e67e80" }

[filetype]
rules = [
	{ url = "*.app/", fg = "#d3c6aa" },
	{ url = "*.framework/", fg = "#d3c6aa" },
	{ url = "*.bundle/", fg = "#d3c6aa" },
	{ url = "*.sh", fg = "#83c092" },
	{ url = "*.bash", fg = "#83c092" },
	{ url = "*.zsh", fg = "#83c092" },
	{ url = "*.fish", fg = "#dbbc7f" },
	{ url = "*.py", fg = "#dbbc7f" },
	{ url = "*.ps1", fg = "#e67e80" },
	{ url = "*.bat", fg = "#dbbc7f" },
	{ url = "*.cmd", fg = "#dbbc7f" },
	{ url = "*.md", fg = "#83c092" },
	{ url = "*.yml", fg = "#7fbbb3" },
	{ url = "*.yaml", fg = "#7fbbb3" },
	{ url = "*.toml", fg = "#7fbbb3" },
	{ url = "*.json", fg = "#7fbbb3" },
	{ url = "*.ini", fg = "#7fbbb3" },
	{ url = "*.c", fg = "#83c092" },
	{ url = "*.h", fg = "#83c092" },
	{ url = "*.cpp", fg = "#83c092" },
	{ url = "*.hpp", fg = "#83c092" },
	{ url = "CMakeLists.txt", fg = "#a7c080" },
	{ url = "*.cmake", fg = "#a7c080" },
	{ url = "LICENSE*", fg = "#e67e80" },
	{ url = "COPYING*", fg = "#e67e80" },
	{ url = "*.properties", fg = "#d3c6aa" },
	{ url = "Kconfig*", fg = "#d3c6aa" },
	{ mime = "image/*", fg = "#83c092" },
	{ mime = "{audio,video}/*", fg = "#dbbc7f" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#e67e80" },
	{ mime = "application/{pdf,doc,rtf}", fg = "#a7c080" },
	{ url = "*", is = "exec", fg = "#a7c080" },
	{ mime = "vfs/{absent,stale}", fg = "#7a8478" },
	{ url = "*", fg = "#d3c6aa" },
	{ url = "*/", fg = "#a7c080" },
]
